version: '3.8'

services:
  # Servicio de Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: kiosko_db
    environment:
      MYSQL_DATABASE: kiosko_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: kiosko_user
      MYSQL_PASSWORD: kiosko_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Servicio de Aplicación Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosko_app
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kiosko_db
      DB_USERNAME: kiosko_user
      DB_PASSWORD: kiosko_pass
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:your-app-key-here
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan db:seed &&
        php artisan serve --host=0.0.0.0
      "

  # Servicio de Nginx (opcional, para producción)
  nginx:
    image: nginx:latest
    container_name: kiosko_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - kiosko-network

volumes:
  db_data:
  app_storage:

networks:
  kiosko-network:
    driver: bridge
