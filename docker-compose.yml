version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: kiosko_db
    environment:
      MYSQL_DATABASE: kiosko_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: kiosko_user
      MYSQL_PASSWORD: kiosko_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - kiosko-network

  # Evolution API (WhatsApp)
  evolution:
    image: athosbr/evolution-api:latest
    container_name: kiosko_evolution
    ports:
      - "8080:8080"
    environment:
      - EVOLUTION_ENABLE_QRCODE=true
      - EVOLUTION_ENABLE_SWAGGER=true
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - db
    networks:
      - kiosko-network
    restart: unless-stopped

  # Aplicación Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosko_app
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kiosko_db
      DB_USERNAME: kiosko_user
      DB_PASSWORD: kiosko_pass
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:your-app-key-here
      EVOLUTION_API_BASE_URL: http://evolution:8080
      EVOLUTION_API_KEY: your_evolution_api_key
      EVOLUTION_INSTANCE: kiosko
      EVOLUTION_WHATSAPP_NUMBER: "+14155238886"
      DEEPSEEK_API_KEY: your_deepseek_api_key
      DEEPSEEK_ENDPOINT: https://api.deepseek.com/chat/completions
      DEEPSEEK_MODEL: deepseek-chat
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      evolution:
        condition: service_started
    networks:
      - kiosko-network
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan db:seed --class=AdminSeeder &&
        php artisan serve --host=0.0.0.0
      "

volumes:
  db_data:
  app_storage:
  evolution_data:

networks:
  kiosko-network:
    driver: bridge
