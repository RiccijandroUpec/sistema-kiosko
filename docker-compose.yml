version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: kiosko_db
    environment:
      MYSQL_DATABASE: kiosko_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: kiosko_user
      MYSQL_PASSWORD: kiosko_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - kiosko-network

  # Aplicación Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosko_app
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kiosko_db
      DB_USERNAME: kiosko_user
      DB_PASSWORD: kiosko_pass
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:your-app-key-here
      WHATSAPP_BUSINESS_TOKEN: your_meta_access_token
      WHATSAPP_BUSINESS_PHONE_ID: your_phone_id
      WHATSAPP_BUSINESS_ACCOUNT_ID: your_waba_id
      WHATSAPP_BUSINESS_PHONE_NUMBER: your_phone_number
      WHATSAPP_API_VERSION: v18.0
      WHATSAPP_BASE_URL: https://graph.facebook.com
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: kiosko_webhook_token_2024
      DEEPSEEK_API_KEY: your_deepseek_api_key
      DEEPSEEK_ENDPOINT: https://api.deepseek.com/chat/completions
      DEEPSEEK_MODEL: deepseek-chat
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kiosko-network
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan db:seed --class=AdminSeeder &&
        php artisan serve --host=0.0.0.0
      "

volumes:
  db_data:
  app_storage:

networks:
  kiosko-network:
    driver: bridge
